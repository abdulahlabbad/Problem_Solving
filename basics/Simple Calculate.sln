#include <iostream>
using namespace std;
int main()
{
    int Number1;
    cout << "Please enter your number1 ?" << endl;
    cin >> Number1;

    int Number2;
    cout << "Please enter your number2 ?" << endl;
    cin >> Number2;

    cout << Number1 << " + " << Number2 << " = " << Number1 + Number2 << endl;
    cout << Number1 << " - " << Number2 << " = " << Number1 - Number2 << endl;
    cout << Number1 << " * " << Number2 << " = " << Number1 * Number2 << endl;
    cout << Number1 << " / " << Number2 << " = " << Number1 / Number2 << endl;
    cout << Number1 << " % " << Number2 << " = " << Number1 % Number2 << endl;
}

